spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: room-service
          uri: lb://room-service
          predicates:
            - Path=/rooms,/rooms/**
          filters:
            - StripPrefix=1
        - id: member-service
          uri: lb://member-service
          predicates:
            - Path=/members,/members/**
          filters:
            - StripPrefix=1
        - id: reservation-service
          uri: lb://reservation-service
          predicates:
            - Path=/reservations,/reservations/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
